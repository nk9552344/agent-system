# ══════════════════════════════════════════════════════════════════════════════
#  AgentX — Configuration  (agent_config.yml)
#  Generated by: agentx init
#  This is the ONLY config file the system uses. Edit it to customise models,
#  workspace paths, specialist agents, and web-tool settings.
# ══════════════════════════════════════════════════════════════════════════════

# ── Ollama model (used by agent mode; also the default for specialists) ───────
model:
  name: qwen2.5:14b-instruct         # any model pulled via  ollama pull <name>
  base_url: http://localhost:11434 # Ollama server URL
  temperature: 0.0                 # 0 = deterministic; higher = creative
  context_window: 8192             # token context window sent to Ollama

# ── Agent mode  (agentx run agent) ───────────────────────────────────────────
agent:
  name: agent
  workspace: .                     # directory the agent reads/writes files in
  system_prompt: null              # leave null to use the built-in system prompt
  require_permission: true         # ask before file writes and shell commands

# ── Researcher mode  (agentx run researcher) ─────────────────────────────────
# The researcher uses a coordinator LLM that delegates subtasks to specialist
# agents, each running in an isolated git worktree.
researcher:
  workspace: .                     # root of the project being improved

  # Optional: path to an evaluation script for autonomous hypothesis testing.
  # The script must export:
  #   evaluate(workspace_path: str) -> float | dict   (higher score = better)
  #   save(workspace_path: str, hypothesis: str, score: float, iter: int) -> None
  # Leave null for interactive research sessions without auto-evaluation.
  eval_script: null

  # ── Coordinator LLM ────────────────────────────────────────────────────────
  # The coordinator decomposes tasks and routes subtasks to specialists.
  # Use a larger / more capable model here for better task decomposition.
  coordinator:
    model: qwen2.5:14b-instruct
    base_url: http://localhost:11434
    temperature: 0.0
    context_window: 16384          # larger context for multi-agent orchestration

  # ── Specialist agents ──────────────────────────────────────────────────────
  # Each entry becomes one specialist agent.
  # The coordinator reads 'description' and 'expertise' to route subtasks.
  # Add / remove specialists or point them at different Ollama models.
  specialists:
    - name: coder
      model: gemma4:12b
      base_url: http://localhost:11434
      temperature: 0.0
      context_window: 8192
      expertise:
        - python
        - typescript
        - code generation
        - debugging
        - testing
        - refactoring
      description: >
        Expert software developer. Delegate here for: writing new code, fixing
        bugs, adding tests, refactoring, and any implementation work.
        Works autonomously using file tools and a shell.

    - name: reviewer
      model: qwen2.5:14b-instruct
      base_url: http://localhost:11434
      temperature: 0.0
      context_window: 8192
      expertise:
        - code review
        - quality assurance
        - security
        - performance
        - documentation
      description: >
        Code reviewer and quality specialist. Delegate here for: reviewing code
        for bugs or security issues, writing tests, checking performance, and
        producing clear documentation or README files.

# ── Shared storage (LanceDB vector database) ─────────────────────────────────
# All agents — both modes — share this store for RAG memory.
storage:
  path: agent_storage/lancedb       # created automatically on first run
  embedding_model: nomic-embed-text # run:  ollama pull nomic-embed-text

# ── Web tools ─────────────────────────────────────────────────────────────────
# Available to every agent at any time (web search, GitHub, PDFs, HTML scraping).
web:
  # GitHub Personal Access Token — STRONGLY RECOMMENDED.
  # Without token: 60 API requests/hr.  With token: 5 000/hr.
  # Create at: https://github.com/settings/tokens  (no scopes needed for public repos)
  # Also readable from GITHUB_TOKEN env var (config value takes precedence).
  github_token: ""

  timeout: 20             # HTTP timeout in seconds
  max_pdf_pages: 60       # max PDF pages to parse before truncating

  # RAG chunking — how fetched content is split before storing in memory
  chunk_size: 2400              # characters per chunk
  chunk_overlap: 150            # overlap between chunks (preserves sentence context)
  max_chunks_per_resource: 50   # hard cap per URL (≈ 120 k chars at default chunk_size)

  # HTTP User-Agent sent when scraping HTML pages
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# ── Debug ─────────────────────────────────────────────────────────────────────
debug: false   # set true for verbose LangGraph / agent logging
