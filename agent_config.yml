# ══════════════════════════════════════════════════════════════════════════════
#  AgentX — Configuration
#  Generated by: agentx init
#  Edit this file to customise models, workspace paths, and web-tool settings.
# ══════════════════════════════════════════════════════════════════════════════

# ── Ollama model (used by both modes unless overridden in specialists.yml) ────
model:
  name: qwen2.5-coder:7b          # any model pulled via  ollama pull <name>
  base_url: http://localhost:11434 # Ollama server URL
  temperature: 0.0                 # 0 = deterministic; higher = creative
  context_window: 8192             # token context window

# ── Agent mode  (agentx run agent) ───────────────────────────────────────────
agent:
  name: agent
  workspace: .                     # directory the agent reads/writes files in
  system_prompt: null              # leave null for the built-in prompt
  require_permission: true         # ask before file writes and shell commands

# ── Researcher mode  (agentx run researcher) ─────────────────────────────────
# The researcher uses a team of specialist agents coordinated by an LLM.
researcher:
  workspace: .                     # root of the project being improved

  # Specialist roster for the coordinator (created by agentx init).
  # Edit agent_storage/specialists.yml to add/remove specialists.
  specialists_config: agent_storage/specialists.yml

  # Optional: path to an evaluation script for autonomous hypothesis testing.
  # The script must export:
  #   evaluate(workspace_path: str) -> float | dict   (higher = better)
  #   save(workspace_path: str, hypothesis: str, score: float, iter: int) -> None
  # Leave null for interactive research sessions without auto-evaluation.
  eval_script: null

# ── Shared storage (LanceDB vector database) ─────────────────────────────────
storage:
  path: agent_storage/lancedb       # all agents share this store
  embedding_model: nomic-embed-text # run:  ollama pull nomic-embed-text

# ── Web tools ─────────────────────────────────────────────────────────────────
# Available to every agent at any time (web search, GitHub, PDFs, scraping).
web:
  # GitHub Personal Access Token — STRONGLY RECOMMENDED.
  # Without token: 60 API requests/hr.  With token: 5 000/hr.
  # Create at: https://github.com/settings/tokens  (no scopes needed for public repos)
  # Also readable from GITHUB_TOKEN env var.
  github_token: ""

  timeout: 20             # HTTP timeout in seconds
  max_pdf_pages: 60       # max PDF pages to parse before truncating

  # RAG chunking — how fetched content is split before storing in memory
  chunk_size: 2400              # characters per chunk
  chunk_overlap: 150            # overlap between chunks (preserves context)
  max_chunks_per_resource: 50   # hard cap per URL (≈ 120 k chars)

  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# ── Debug ─────────────────────────────────────────────────────────────────────
debug: false   # set true for verbose LangGraph logging
